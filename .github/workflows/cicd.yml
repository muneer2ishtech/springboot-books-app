# see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Java CI with Maven and Docker

on:
  # Only on push to any branches or on publishing release tag
  push:
    branches:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Extract Gradle project version
      id: project-version
      run: |
        chmod +x ./gradlew
        echo "project_version=$(./gradlew -q printVersion 2>/dev/null)" >> $GITHUB_OUTPUT

    - name: Build with Gradle
      run: ./gradlew clean build

    - name: Build the Docker image
      if: github.ref_type == 'tag' && github.event.base_ref == 'refs/heads/main'
      run: |
        docker build . --file Dockerfile \
          --tag muneer2ishtech/ishtech-springboot-books-app:${{ steps.project-version.outputs.project_version }}
