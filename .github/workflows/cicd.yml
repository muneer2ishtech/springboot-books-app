# Build, test a Maven project and release as Docker image.
## see: https://docs.github.com/en/actions/tutorials/build-and-test-code/java-with-maven
## see: https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images

name: Java CI with Gradle and Docker

on:
  # Only on push to any branches or on tag
  push:
    branches: ['**']
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

  workflow_dispatch:
    inputs:
      manual_deploy:
        description: "Trigger manual deployment"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  gradle-docker-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'

      # 1. Validate version against branch / release tag
    - name: Validate Project Version
      id: validate-project-version
      env:
        MANUAL_DEPLOY: ${{ inputs.manual_deploy }}
      run: |
        chmod +x ./gradlew
        APP_VERSION=$(./gradlew -q printVersion 2>/dev/null)
        echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
        echo "Event=$GITHUB_EVENT_NAME  Ref=$GITHUB_REF_NAME ($GITHUB_REF_TYPE)  Version=$APP_VERSION"

          # ---------- RELEASE RULE ----------
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            if [[ "$APP_VERSION" == *-SNAPSHOT ]]; then
              echo "❌ ERROR: Tagged version cannot be SNAPSHOT. Found: $APP_VERSION"
              exit 1
            fi
            if [[ "${GITHUB_REF_NAME#v}" != "$APP_VERSION" ]]; then
              echo "❌ ERROR: Tag ($GITHUB_REF_NAME) does NOT match pom version ($APP_VERSION)"
              exit 1
            fi
          fi

      # 2. Compile
    - name: Gradle Compile
      run: ./gradlew clean build -x test

      # 3. Test
    - name: Gradle Test
      run: ./gradlew test

      # 4. Release (only when conditions match)
    - name: Login to Docker Hub
      if: steps.validate-project-version.outputs.do_release == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build and push Docker image
      if: steps.validate-project-version.outputs.do_release == 'true'
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: muneer2ishtech/ishtech-springboot-books-app:${{ steps.validate-project-version.outputs.app_version }}
